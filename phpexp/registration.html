<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>

<style>
body{
font-family: Arial;
background:#e3dcdc;
}

form{
width:350px;
margin:50px auto;
padding:20px;
background:rgb(250, 250, 251);
border-radius:8px;
}

input{
width:100%;
padding:8px;
margin:8px 0;
}

button{
padding:10px;
width:100%;
background:rgb(61, 61, 178);
color:rgb(141, 27, 27);
border:none;
}
</style>

<script>
function validateForm(){

let name=document.forms["regForm"]["name"].value;
let email=document.forms["regForm"]["email"].value;

if(name==""){
alert("Name is required");
return false;
}

if(email==""){
alert("Email is required");
return false;
}

return true;
}
</script>

</head>

<body>

<form name="regForm" action="post_registration.php" method="POST" onsubmit="return validateForm()">

<h2>Registration Form</h2>

Name:
<input type="text" name="name">

Email:
<input type="text" name="email">

Age:
<input type="number" name="age">

Password:
<input type="password" name="password">

<button type="submit">Register</button>

</form>

</body>
</html>
